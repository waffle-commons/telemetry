# Mago Configuration - Waffle Commons ({COMPONENT_NAME}, Beta 0)
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.5"

[source]
paths = ["src/", "tests/"]
includes = ["vendor"]
excludes = []

# -----------------------------------------------------------------------------
# Mago Guard — Beta 0 standardized architectural perimeter
# -----------------------------------------------------------------------------
# By default a new component depends only on `waffle-commons/contracts`. Edit
# the `permit` list below if your component legitimately requires another
# waffle-commons package (and declare the dependency in composer.json).
[guard]
mode = "default"
excludes = ["tests/bootstrap.php"]

[guard.perimeter]
layering = ["Waffle", "WaffleTests"]

[guard.perimeter.layers]
core = ["@global", "Psl\\**"]
psr = ["Psr\\**"]

[[guard.perimeter.rules]]
namespace = "Waffle\\Commons\\{COMPONENT_NAME}"
permit = [
    "Waffle\\Commons\\{COMPONENT_NAME}\\**",
    "Waffle\\Commons\\Contracts\\**",
    "@layer:core",
    "@layer:psr",
]

[[guard.perimeter.rules]]
namespace = "WaffleTests\\Commons\\{COMPONENT_NAME}"
permit = ["@all"]

[[guard.structural.rules]]
on = "Waffle\\Commons\\**"
target = "interface"
must-be-named = "*Interface"
reason = "Interfaces must follow the waffle-commons *Interface convention."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Enum\\**"
must-be = ["enum"]
reason = "Reserved namespace: only enum declarations are permitted here."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Exception\\**"
target = "class"
must-be-named = "*Exception"
reason = "Exception classes must follow the *Exception naming convention."

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true
end-of-line = "lf"

[linter]
# Zero-Baseline policy (Beta 0): no `baseline = ...` is permitted.
integrations = ["phpunit"]

[linter.rules]
# Security - Zero tolerance
no-insecure-comparison = { level = "error" }
no-literal-password = { level = "error" }
no-debug-symbols = { level = "error" }
disallowed-functions = { level = "error", functions = ["eval", "exec", "system", "shell_exec", "passthru", "phpinfo"] }

# Code quality - Strict
prefer-interface = { level = "error" }
strict-types = { level = "error" }
# NOTE: the template's `property-type` / `return-type` linter rules were removed:
# they are not recognised by the pinned mago 1.29.0 (they break config parsing)
# and are already enforced natively by the strict `[analyzer]` block below.

cyclomatic-complexity = { level = "warning", threshold = 10 }

# Style - Notes (informational)
prefer-arrow-function = { level = "note" }
no-redundant-nullsafe = { level = "note" }

[analyzer]
# Zero-Baseline policy (Beta 0): no `baseline = ...` is permitted.
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
check-throws = true
strict-list-index-checks = true
strict-array-index-existence = true
