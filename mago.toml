# Mago Configuration - Waffle Commons (Telemetry, Beta 0)
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.5"

[source]
paths = ["src/", "tests/"]
includes = ["vendor"]
excludes = []

# -----------------------------------------------------------------------------
# Mago Guard — Beta 0 standardized architectural perimeter
# -----------------------------------------------------------------------------
# By default a new component depends only on `waffle-commons/contracts`. Edit
# the `permit` list below if your component legitimately requires another
# waffle-commons package (and declare the dependency in composer.json).
[guard]
mode = "default"
excludes = ["tests/bootstrap.php"]

[guard.perimeter]
layering = ["Waffle", "WaffleTests"]

[guard.perimeter.layers]
core = ["@global", "Psl\\**"]
psr = ["Psr\\**"]

[[guard.perimeter.rules]]
namespace = "Waffle\\Commons\\Telemetry"
permit = [
    "Waffle\\Commons\\Telemetry\\**",
    "Waffle\\Commons\\Contracts\\**",
    "@layer:core",
    "@layer:psr",
]

[[guard.perimeter.rules]]
namespace = "WaffleTests\\Commons\\Telemetry"
permit = ["@all"]

[[guard.structural.rules]]
on = "Waffle\\Commons\\**"
target = "interface"
must-be-named = "*Interface"
reason = "Interfaces must follow the waffle-commons *Interface convention."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Enum\\**"
must-be = ["enum"]
reason = "Reserved namespace: only enum declarations are permitted here."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Exception\\**"
target = "class"
must-be-named = "*Exception"
reason = "Exception classes must follow the *Exception naming convention."

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true
end-of-line = "lf"

[linter]
# Zero-Baseline policy (Beta 0): no `baseline = ...` is permitted.
integrations = ["phpunit"]

[linter.rules]
# Security - Zero tolerance
no-insecure-comparison = { level = "error" }
no-literal-password = { level = "error" }
no-debug-symbols = { level = "error" }
disallowed-functions = { level = "error", functions = ["eval", "exec", "system", "shell_exec", "passthru", "phpinfo"] }

# Code quality - Strict
prefer-interface = { level = "error" }
strict-types = { level = "error" }
no-ini-set = { enabled = false }

# >>> alpha6-opinionated-suppressions (generated) — ecosystem-standard linter policy,
# matching every shipped waffle-commons component (the Beta-0 template lagged behind).
literal-named-argument = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
single-class-per-file = { enabled = false }
no-else-clause = { enabled = false }
block-statement = { enabled = false }
assertion-style = { enabled = false }
assert-description = { enabled = false }
tagged-todo = { enabled = false }
cyclomatic-complexity = { enabled = true, threshold = 50 }
too-many-methods = { enabled = false }
kan-defect = { enabled = false }
halstead = { enabled = false }
prefer-arrow-function = { enabled = false }
no-redundant-nullsafe = { enabled = false }
excessive-parameter-list = { enabled = false }
# <<< alpha6-opinionated-suppressions

[analyzer]
# Zero-Baseline policy: no `baseline = ...` is permitted. `check-throws` stays ON for
# src (it enforces @throws docs); PHPUnit assertion exceptions are ignored in tests/ only.
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
check-throws = true
strict-list-index-checks = true
strict-array-index-existence = true
ignore = [
    # PHPUnit assertions throw ExpectationFailedException by design; declaring it on
    # every test method is noise (every shipped component exempts tests like this).
    { code = "unhandled-thrown-type", in = ["tests/"] },
    { code = "mixed-assignment", in = ["tests/"] },
    { code = "mixed-argument", in = ["tests/"] },
    { code = "mixed-operand", in = ["tests/"] },
    { code = "deprecated-method", in = ["tests/"] },
    # Test fixtures index result arrays after asserting their shape; Mago can't carry
    # that proof across the assertion boundary (every shipped component exempts tests).
    { code = "possibly-undefined-int-array-index", in = ["tests/"] },
    { code = "possibly-undefined-string-array-index", in = ["tests/"] },
]
